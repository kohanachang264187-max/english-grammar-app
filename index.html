<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b4f6c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="英文法12">
  <title>英文法12｜地方国立大学受験</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="homeButton" class="brand" aria-label="ホームへ">
        <span class="brand-mark">G</span>
        <span><strong>英文法12</strong><small>地方国立大学受験</small></span>
      </button>
      <div class="top-actions">
        <button id="speakQuestionButton" class="icon-button" title="問題を読み上げる" aria-label="問題を読み上げる">🔊</button>
        <button id="settingsButton" class="icon-button" title="設定" aria-label="設定">⚙️</button>
      </div>
    </header>

    <main id="mainView" class="main-view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button data-view="home" class="nav-button active"><span>🏠</span><small>今日</small></button>
      <button data-view="units" class="nav-button"><span>📚</span><small>単元</small></button>
      <button data-view="weak" class="nav-button"><span>🎯</span><small>苦手</small></button>
      <button data-view="report" class="nav-button"><span>📊</span><small>記録</small></button>
    </nav>
  </div>

  <dialog id="modal">
    <div id="modalContent"></div>
    <button id="modalClose" class="secondary-button">閉じる</button>
  </dialog>

  <div id="toast" class="toast" role="status"></div>

  <script src="questions.js?v=2.0.0"></script>
  <script src="app.js?v=2.0.0"></script>
</body>
</html>
